# main_vanilla.py - FreqFed + BadNets 攻击
experiment_name: freqfed
logging:
  project: SafeFL_Vanilla
  use_wandb: true

model:
  name: resnet18
  params:
    num_classes: 10
    input_channels: 3

dataset: cifar10

algorithm:
  name: freqfed
  params:
    screener:
      params:
        min_samples: 1
        allow_single_cluster: true

attack:
  enabled: true
  malicious_epochs: 5
