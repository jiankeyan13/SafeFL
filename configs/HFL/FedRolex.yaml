# main_hfl.py - 异构联邦学习 (HFL) FedRoLex
experiment_name: fedrolex
dataset: cifar10

logging:
  project: FL_Base
  use_wandb: true

# HFL 特有: 使用 hetero_PreResNet18 + fedrolex
model:
  name: hetero_PreResNet18
  params:
    num_classes: 10
    input_channels: 3

algorithm:
  name: fedrolex
  params:
    aggregator:
      name: sub_avg

# 异构能力分配配置 (HeteroConfig)
hetero:
  sample: uniform
  p_list: [0.25, 0.5, 1.0]
  alpha: 3.0
  beta: 3.0
  attacker:
    enabled: false
    sample: uniform
    p_list: []
