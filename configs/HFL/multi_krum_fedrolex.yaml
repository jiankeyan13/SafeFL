# main_hfl.py - 异构联邦学习 (HFL) Multi-Krum + FedRoLex
# 实验配置: epoch=2, rounds=150, malicious_epochs=5
experiment_name: multi_krum_fedrolex
dataset: cifar10
epochs: 2
rounds: 150
device: cuda:5

logging:
  project: HFL_experiment1
  use_wandb: true

algorithm:
  name: multi_krum_fedrolex
  params:
    screener:
      f: 4
      m: 10

attack:
  enabled: true
  malicious_epochs: 5

hetero:
  attacker:
    enabled: true
