# @package _global_
training:
  num_clients: 100
  rounds: 100
  clients_fraction: 0.2
  eval_interval: 5
  local_eval_ratio: 0.2
  lr_schedule:
    enabled: true
    name: warmup_cosine
    warmup_ratio: 0.1
    min_lr: 0.0
    warmup_start_lr: 0.0

client:
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  optimizer_name: SGD
  criterion_name: CrossEntropyLoss
  epochs: 2
  batch_size: 32
  num_workers: 0
  grad_clip_norm: 5.0
  bn_calib_batches: 5
